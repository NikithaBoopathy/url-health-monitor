apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-health-monitor
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-health-monitor
  template:
    metadata:
      labels:
        app: url-health-monitor
    spec:
      containers:
      - name: monitor
        image: nikithaboopathy/url-health-monitor:b6ae37cb2928021bc7cb4862d401298ebf55bbaa
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: monitor-config
        - secretRef:
            name: monitor-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
